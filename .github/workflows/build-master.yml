name: PlatformIO Build and Release master

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('master/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
      
      - name: Build firmware
        working-directory: ./master
        run: pio run --environment lolin_c3_mini --environment lolin_s3_mini
      
      - name: Rename binaries
        working-directory: ./master
        run: |
          cp .pio/build/lolin_c3_mini/firmware.bin lolin_c3_mini.bin
          cp .pio/build/lolin_s3_mini/firmware.bin lolin_s3_mini.bin
      
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            master/lolin_c3_mini.bin
            master/lolin_s3_mini.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Create tag for commit
        run: |
          git tag ${{ steps.short-sha.outputs.sha }}
          git push origin ${{ steps.short-sha.outputs.sha }}
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false
      
      - name: Create/Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Latest automatic build from commit ${{ github.sha }}
            
            Built on: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.event.head_commit.message }}
          files: |
            artifacts/firmware-binaries/lolin_c3_mini.bin
            artifacts/firmware-binaries/lolin_s3_mini.bin
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
